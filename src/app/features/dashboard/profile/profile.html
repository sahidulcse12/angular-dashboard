<div class="profile-wrapper">

  <div class="profile-header">
    <div class="avatar">
      {{ userName.charAt(0) }}
    </div>

    <div class="header-info">
      <h2>{{ userName }}</h2>
      <p>{{ role }}</p>
    </div>
  </div>

  <div class="profile-card">

    <h3>Profile Details</h3>

    <div class="form-grid">

      <div class="form-group">
        <label>Name</label>
        <input [(ngModel)]="userName" (input)="onChange()" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="email" (input)="onChange()" />
      </div>

      <div class="form-group">
        <label>Role</label>
        <input [(ngModel)]="role" (input)="onChange()" />
      </div>

      <div class="form-group">
        <label>Joined</label>
        <input [value]="joinDate" disabled />
      </div>

    </div>

    <div class="actions">
      <button class="btn-primary" (click)="onSave()">Save Changes</button>
    </div>

  </div>

</div>
