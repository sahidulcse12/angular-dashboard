<div class="profile-container">
  <h2>👤 My Profile</h2>

  <div class="profile-card">
    <div class="profile-avatar">
      <span class="avatar-initials">SI</span>
    </div>

    <div class="profile-info">
      <div class="info-row">
        <label>Name</label>
        <p>{{ userName }}</p>
      </div>
      <div class="info-row">
        <label>Email</label>
        <p>{{ email }}</p>
      </div>
      <div class="info-row">
        <label>Role</label>
        <p>{{ role }}</p>
      </div>
      <div class="info-row">
        <label>Joined</label>
        <p>{{ joinDate }}</p>
      </div>
    </div>
  </div>
</div>
